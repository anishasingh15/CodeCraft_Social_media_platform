{% extends 'base.html' %}

{% block content %}

<style>

.create-post{
    margin-top:30px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.06);
}

.post-title{
    font-size:20px;
    font-weight:700;
    color:#1A1D2E;
}

.post-btn{
    background:#4C6EF5;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    font-weight:600;
}

.post-btn:hover{
    background:#2F4AC3;
}

</style>


<div class="create-post">

    <h4 class="post-title">
        📝 Create Post
    </h4>


    <form method="POST"
          action="{% url 'create_post' %}"
          enctype="multipart/form-data">

        {% csrf_token %}


        <textarea
            name="content"
            class="form-control mt-3"
            rows="4"
            placeholder="💭 What's on your mind?"></textarea>


        <input
            type="file"
            name="image"
            accept="image/*,video/*"
            class="form-control mt-3">


        <button type="submit" class="post-btn mt-3">
            🚀 Post
        </button>


    </form>

</div>


{% endblock %}
