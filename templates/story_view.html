{% block content %}

<style>

body{
    margin:0;
    background:black;
    overflow:hidden;
}

.story-container{
    width:100vw;
    height:100vh;
    position:relative;
}

.story-img,
.story-video{
    width:100%;
    height:100vh;
    object-fit:contain;
}

.top-bar{
    position:absolute;
    top:15px;
    left:15px;
    right:60px;
    display:flex;
    gap:5px;
    z-index:100;
}

.bar{
    flex:1;
    height:4px;
    background:rgba(255,255,255,.3);
    border-radius:10px;
}

.bar.active{
    background:white;
}

.close-btn{
    position:absolute;
    top:10px;
    right:15px;
    width:40px;
    height:40px;
    border-radius:50%;
    background:rgba(0,0,0,.5);
    color:white;
    text-decoration:none;
    font-size:28px;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.actions{
    position:absolute;
    bottom:30px;
    left:0;
    right:0;
    text-align:center;
    z-index:999;
}

.btn{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    text-decoration:none;
    color:white;
    margin:5px;
}

.download{
    background:green;
}

.delete{
    background:red;
}

</style>

<div class="story-container">

<a href="/home/" class="close-btn">
    ✕
</a>

<div class="top-bar">

```
{% for s in stories %}

<div class="bar {% if s.id == current_story.id %}active{% endif %}"></div>

{% endfor %}
```

</div>

{% if current_story.video %}

<video autoplay muted controls class="story-video">

```
<source src="{{ current_story.video.url }}">
```

</video>

{% else %}

<img src="{{ current_story.image.url }}"
  class="story-img">

{% endif %}

<div class="actions">

```
{% if current_story.video %}

<a href="{{ current_story.video.url }}"
   download
   class="btn download">

   ⬇ Download

</a>

{% else %}

<a href="{{ current_story.image.url }}"
   download
   class="btn download">

   ⬇ Download

</a>

{% endif %}

{% if current_story.user == request.user %}

<a href="/delete-story/{{ current_story.id }}/"
   class="btn delete">

   🗑 Delete

</a>

{% endif %}
```

</div>

</div>

<script>

const stories = [

{% for s in stories %}

"/story/{{ s.id }}/",

{% endfor %}

];

let currentIndex = 0;

{% for s in stories %}
{% if s.id == current_story.id %}
currentIndex = {{ forloop.counter0 }};
{% endif %}
{% endfor %}

setTimeout(() => {

    if(currentIndex < stories.length - 1){

        window.location.href = stories[currentIndex + 1];

    }else{

        window.location.href = "/home/";

    }

}, 20000);

document.addEventListener("click", function(e){

    if(e.target.classList.contains('close-btn')){
        return;
    }

    if(e.clientX > window.innerWidth / 2){

        if(currentIndex < stories.length - 1){

            window.location.href = stories[currentIndex + 1];

        }

    }else{

        if(currentIndex > 0){

            window.location.href = stories[currentIndex - 1];

        }

    }

});

</script>

{% endblock %}
