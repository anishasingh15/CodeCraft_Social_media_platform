<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SocialHub - Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}



body{

font-family:'Inter',sans-serif;

background:linear-gradient(145deg,#F5F7FF,#EEF2FF);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

transition:.3s;

}



/* LOGO */


.logo{

position:absolute;

top:30px;

left:60px;

display:flex;

align-items:center;

gap:12px;

font-size:22px;

font-weight:800;

color:#1A1D2E;

margin-left:-40px;

}



.logo-icon{

width:45px;

height:45px;

border-radius:50%;

background:linear-gradient(135deg,#7950F2,#4C6EF5,#22B8CF);

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

}



.logo span{

color:#4C6EF5;

}



/* TOP RIGHT */


.top-menu{

position:fixed;

top:30px;

right:60px;

display:flex;

gap:20px;

align-items:center;

z-index:9999;

}



.admin-profile,
.theme-btn{

font-size:22px;

text-decoration:none;

cursor:pointer;

background:none;

border:none;

}
.theme-btn{
margin-right:-40px;}

.admin-profile:hover,
.theme-btn:hover{

transform:scale(1.15);

}




/* REGISTER BOX */


.register-box{

width:420px;

background:white;

padding:40px;

border-radius:24px;

box-shadow:0 20px 50px rgba(59,91,219,.15);

}



/* USER ICON */


.user-logo{

width:80px;

height:80px;

border-radius:50%;

background:#EEF2FF;

display:flex;

align-items:center;

justify-content:center;

font-size:38px;

margin:auto;

margin-bottom:20px;

}



/* TEXT */


h1{

text-align:center;

font-size:32px;

font-weight:800;

color:#1A1D2E;

margin-bottom:10px;

}



.subtitle{

text-align:center;

color:#6B7280;

font-size:14px;

margin-bottom:25px;

}




/* INPUT */


input{

width:100%;

padding:14px 16px;

border-radius:12px;

border:1px solid #E5E7EB;

margin-bottom:16px;

font-size:14px;

outline:none;

}



input:focus{

border-color:#4C6EF5;

}





/* BUTTON */


button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#4C6EF5;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

}



button:hover{

background:#2F4AC3;

}




/* LOGIN */


.login{

text-align:center;

margin-top:25px;

color:#6B7280;

}



.login a{

color:#4C6EF5;

font-weight:700;

text-decoration:none;

}





/* =================
 DARK MODE
================= */


body.dark-mode{

background:#121212;

color:white;

}



body.dark-mode .logo{

color:white;

}



body.dark-mode .register-box{

background:#1e1e1e;

box-shadow:0 20px 50px rgba(0,0,0,.7);

}



body.dark-mode .user-logo{

background:#333;

}



body.dark-mode h1{

color:white;

}



body.dark-mode .subtitle{

color:#aaa;

}



body.dark-mode input{

background:#000;

color:white;

border:1px solid #555;

}



body.dark-mode input::placeholder{

color:#aaa;

}



body.dark-mode .login{

color:#aaa;

}





@media(max-width:600px){


.logo{

left:20px;

}


.top-menu{

right:20px;

}


.register-box{

width:90%;

padding:30px;

}


}



</style>


</head>



<body>



<div class="logo">


<div class="logo-icon">

👥

</div>


Social<span>Hub</span>


</div>





<div class="top-menu">


<a href="/admin/" class="admin-profile">

👤

</a>



<div onclick="toggleTheme()" class="theme-btn">

🌙

</div>


</div>





<div class="register-box">


<div class="user-logo">

👤

</div>




<h1>

Create Account

</h1>



<p class="subtitle">

Join SocialHub and start sharing your moments

</p>




{% if error %}

<div>

{{error}}

</div>

{% endif %}





<form method="POST">

{% csrf_token %}




<input

type="text"

name="username"

placeholder="Username"

required>




<input

type="email"

name="email"

placeholder="Email Address"

required>




<input

type="password"

name="password"

placeholder="Password"

required>




<input

type="password"

name="confirm_password"

placeholder="Confirm Password"

required>





<button>

Create Account 🚀

</button>



</form>






<div class="login">


Already have an account?


<a href="/login/">

Login

</a>


</div>



</div>






<script>


function toggleTheme(){


document.body.classList.toggle("dark-mode");



if(document.body.classList.contains("dark-mode")){

localStorage.setItem("theme","dark");

}

else{

localStorage.setItem("theme","light");

}


}




window.onload=function(){


if(localStorage.getItem("theme")=="dark"){

document.body.classList.add("dark-mode");

}


}



</script>



</body>

</html>
