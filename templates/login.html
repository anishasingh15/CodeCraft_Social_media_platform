<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SocialHub - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

font-family:'Inter',sans-serif;

background:linear-gradient(145deg,#F5F7FF,#EEF2FF);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

transition:.3s;

}



/* LOGO */


.logo{

position:absolute;

top:30px;

left:60px;

display:flex;

align-items:center;

gap:12px;

font-size:22px;
margin-left:-40px;
font-weight:800;

color:#1A1D2E;

}


.logo-icon{

width:45px;
height:45px;

border-radius:50%;

background:linear-gradient(135deg,#7950F2,#4C6EF5,#22B8CF);

display:flex;

align-items:center;

justify-content:center;

font-size:22px;

}



.logo span{

color:#4C6EF5;

}



/* TOP MENU */


.top-menu{

position:fixed;

top:30px;

right:60px;

display:flex;

align-items:center;

gap:20px;

z-index:9999;

}



.admin-profile{


font-size:22px;

text-decoration:none;

cursor:pointer;

background:none;

}



.theme-btn{


font-size:22px;
margin-right:-30px;
cursor:pointer;

background:none;

}



.admin-profile:hover,
.theme-btn:hover{

transform:scale(1.15);

}




/* LOGIN BOX */


.login-box{

width:420px;

background:white;

padding:40px;

border-radius:24px;

box-shadow:0 20px 50px rgba(59,91,219,.15);

transition:.3s;

}




/* ICON */


.login-icon{

width:80px;

height:80px;

border-radius:50%;

background:#EEF2FF;

display:flex;

align-items:center;

justify-content:center;

font-size:38px;

margin:auto;

margin-bottom:20px;

}




h1{

text-align:center;

font-size:32px;

font-weight:800;

color:#1A1D2E;

margin-bottom:10px;

}



.subtitle{

text-align:center;

font-size:14px;

color:#6B7280;

margin-bottom:30px;

}




/* INPUT */


input{

width:100%;

padding:14px 16px;

border-radius:12px;

border:1px solid #E5E7EB;

margin-bottom:18px;

font-size:14px;

outline:none;

}



input:focus{

border-color:#4C6EF5;

}





.remember{

display:flex;

align-items:center;

gap:8px;

color:#6B7280;

margin-bottom:20px;

}



.remember input{

width:auto;

margin:0;

}





button{


width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#4C6EF5;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

}



button:hover{

background:#2F4AC3;

}




.register{

text-align:center;

margin-top:25px;

color:#6B7280;

}



.register a{

color:#4C6EF5;

font-weight:700;

text-decoration:none;

}






/* =================
 DARK MODE
================= */


body.dark-mode{

background:#121212;

color:white;

}




body.dark-mode .logo{

color:white;

}





body.dark-mode .login-box{

background:#1e1e1e;

box-shadow:0 20px 50px rgba(0,0,0,.7);

}




body.dark-mode .login-icon{

background:#333;

}




body.dark-mode h1{

color:white;

}




body.dark-mode .subtitle{

color:#aaa;

}





body.dark-mode input{

background:#000;

color:white;

border:1px solid #555;

}





body.dark-mode input::placeholder{

color:#aaa;

}





body.dark-mode .remember{

color:#ccc;

}





body.dark-mode .register{

color:#aaa;

}





body.dark-mode .admin-profile,
body.dark-mode .theme-btn{

color:white;

}





@media(max-width:600px){


.logo{

left:20px;

}



.top-menu{

right:20px;

}



.login-box{

width:90%;

padding:30px;

}



}



</style>

</head>



<body>




<div class="logo">


<div class="logo-icon">

👥

</div>


Social<span>Hub</span>


</div>





<div class="top-menu">


<a href="/admin/" class="admin-profile">

👤

</a>



<div onclick="toggleTheme()" class="theme-btn">

🌙

</div>


</div>






<div class="login-box">



<div class="login-icon">

🔐

</div>




<h1>

Welcome Back

</h1>



<p class="subtitle">

Login to continue your SocialHub journey

</p>




<form method="POST">

{% csrf_token %}



<input 
type="text"
name="username"
placeholder="Username"
required>




<input

type="password"

name="password"

placeholder="Password"

required>




<div class="remember">


<input type="checkbox">


Remember me


</div>




<button>

Login 🚀

</button>



</form>




<div class="register">


Don't have an account?


<a href="/register/">

Create Account

</a>


</div>



</div>






<script>


function toggleTheme(){


document.body.classList.toggle("dark-mode");



if(document.body.classList.contains("dark-mode")){

localStorage.setItem("theme","dark");

}

else{

localStorage.setItem("theme","light");

}



}




window.onload=function(){


if(localStorage.getItem("theme")=="dark"){


document.body.classList.add("dark-mode");


}


}



</script>




</body>
</html>
